name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dotnet:
    name: .NET Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore apps/api/Api.slnx

      - name: Build
        run: dotnet build apps/api/Api.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution apps/api/Api.slnx --configuration Release --no-build

  # Node lint/typecheck/test will be added in a future PR when web/ exists
